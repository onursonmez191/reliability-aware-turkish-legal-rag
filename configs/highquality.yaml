paths:
  raw_dir: data/raw
  processed_dir: data/processed
  passages_file: data/processed/passages.jsonl
  heldout_file: data/processed/heldout.jsonl
  faiss_index: data/processed/faiss.index
  passage_meta: data/processed/passage_meta.jsonl
  curated_sources_file: data/curated/legal_sources.jsonl
  preprocessing_report: data/processed/preprocessing_report.md
  eval_dir: evaluation/results

data:
  dataset_name: OrionCAF/turkish_law_qa_dataset
  dataset_split: train
  min_answer_chars: 60
  heldout_size: 50
  seed: 42
  statutes:
    enabled: true
    dataset_name: muhammetakkurt/mevzuat-gov-dataset
    dataset_split: train
    min_article_chars: 40
    # Full core-code coverage for the big run.
    include_law_numbers:
      - "6098"   # Türk Borçlar Kanunu
      - "4721"   # Türk Medeni Kanunu
      - "4857"   # İş Kanunu
      - "5237"   # Türk Ceza Kanunu

retrieval:
  embedding_model: intfloat/multilingual-e5-large   # upgraded from e5-base
  batch_size: 128
  top_k: 8
  query_expansion:
    enabled: true
  rerank:
    enabled: true                                    # cross-encoder reranking on
    model: BAAI/bge-reranker-v2-m3
    candidate_k: 30
    keep_top: 8
  confidence:
    enabled: true
    min_top_score: 0.75
    min_avg_top3_score: 0.70

generation:
  provider: ollama
  base_url: http://127.0.0.1:11434/v1
  hf_model: qwen3.6:27b
  max_new_tokens: 512
  temperature: 0.2
  timeout_s: 300

verification:
  hf_model: qwen3.6:27b
  max_new_tokens: 768
  temperature: 0.0

models:
  default: qwen3.6:27b
  keep_alive: 30m
  load_timeout_s: 900
  unload_timeout_s: 30
  available:
    - name: qwen3.6:27b
      label: Qwen 3.6 27B
      note: dense reasoning model
    - name: gemma4:31b
      label: Gemma 4 31B
      note: dense multilingual model

api:
  host: 0.0.0.0
  port: 8000
  static_dir: app
  cors_origins:
    - http://localhost:8000
    - http://127.0.0.1:8000
