paths:
  raw_dir: data/raw
  processed_dir: data/processed
  passages_file: data/processed/passages.jsonl
  heldout_file: data/processed/heldout.jsonl
  faiss_index: data/processed/faiss.index
  passage_meta: data/processed/passage_meta.jsonl
  preprocessing_report: data/processed/preprocessing_report.md
  eval_dir: evaluation/results

data:
  dataset_name: OrionCAF/turkish_law_qa_dataset
  dataset_split: train
  min_answer_chars: 60
  heldout_size: 50
  seed: 42

retrieval:
  embedding_model: intfloat/multilingual-e5-base
  batch_size: 64
  top_k: 8
  rerank:
    enabled: false
    model: BAAI/bge-reranker-v2-m3
    candidate_k: 20
    keep_top: 5
  confidence:
    enabled: true
    min_top_score: 0.75
    min_avg_top3_score: 0.70

generation:
  provider: ollama  # ollama | hf
  base_url: http://127.0.0.1:11434/v1
  hf_model: qwen2.5:7b-instruct
  max_new_tokens: 512
  temperature: 0.2
  timeout_s: 180

verification:
  hf_model: qwen2.5:7b-instruct
  max_new_tokens: 768
  temperature: 0.0

models:
  default: qwen2.5:7b-instruct
  keep_alive: 10m
  load_timeout_s: 600
  unload_timeout_s: 30
  available:
    - name: qwen2.5:7b-instruct
      label: Qwen 2.5 7B
      note: lightweight baseline
    - name: qwen3.6:27b
      label: Qwen 3.6 27B
      note: dense reasoning model
    - name: gemma4:31b
      label: Gemma 4 31B
      note: dense multilingual model

api:
  host: 127.0.0.1
  port: 8000
  static_dir: app
  cors_origins:
    - http://localhost:8000
    - http://127.0.0.1:8000
